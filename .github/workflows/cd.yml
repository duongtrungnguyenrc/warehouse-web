name: CD - Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 200m
          script: |
            echo ">> Deploying to production..."

            cd ~/application/wms/warehouse-web
            git pull origin main

            echo ">> Build Docker image"
            docker build -t warehouse-web:latest .

            echo ">> Stop and remove old container"
            docker stop warehouse-web || true
            docker rm warehouse-web || true

            echo ">> Start new container"
            docker run -d --name warehouse-web -p 3000:80 warehouse-web:latest

            docker ps

      - name: Notify Done
        run: echo "CD completed successfully."
